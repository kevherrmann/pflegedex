services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
    environment:
      PFLEGEDEX_AUTO_MIGRATE: ${PFLEGEDEX_AUTO_MIGRATE:-true}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: caddy:2.8-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
    environment:
      VITE_APP_NAME: Pflegedex
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_PORT: ${VITE_PORT:-5173}
      APP_URL: ${APP_URL:-http://localhost:8080}

  queue:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: php artisan queue:work --tries=3 --backoff=5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pflegedex}
      POSTGRES_USER: ${DB_USERNAME:-pflegedex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pflegedex}
      PGDATA: /var/lib/postgresql/data/pgdata
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=1024m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pflegedex} -d ${DB_DATABASE:-pflegedex}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit-data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Einmalbefehl: zieht das konfigurierte Modell, sobald ollama healthy ist.
  # Laeuft beim docker-compose up im Hintergrund, beendet sich dann selbst.
  # Beim zweiten Start ist das Modell bereits im Volume - der Pull merkt das
  # und kehrt sofort zurueck (Layer-Cache).
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      AI_MODEL: ${AI_MODEL:-gemma4:e2b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling Modell ${AI_MODEL:-gemma4:e2b} ..."
        ollama pull "${AI_MODEL:-gemma4:e2b}" || {
          echo "WARN: Pull fehlgeschlagen. Pflegedex laeuft trotzdem, KI-Features sind dann deaktiviert."
          exit 0
        }
        echo "Modell ${AI_MODEL:-gemma4:e2b} bereit."
    restart: "no"

volumes:
  redis-data:
  mailpit-data:
  ollama-data:
